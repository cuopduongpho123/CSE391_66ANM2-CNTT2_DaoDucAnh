<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Form Đặt Hàng</title>

<style>

body{
font-family:Arial;
background:#f4f6fb;
display:flex;
justify-content:center;
padding:40px;
}

.container{
background:white;
padding:25px;
width:450px;
border-radius:10px;
box-shadow:0 4px 15px rgba(0,0,0,0.1);
}

.form-group{
margin-bottom:12px;
}

input[type="text"],
input[type="number"],
input[type="date"],
select,
textarea{
width:100%;
padding:7px;
border:1px solid #ccc;
border-radius:5px;
}

textarea{
resize:none;
}

.pay-group{
display:flex;
gap:20px;
margin-top:5px;
}

.error{
color:red;
font-size:13px;
}

.counter{
font-size:12px;
text-align:right;
}

button{
margin-top:10px;
padding:8px;
width:100%;
background:#4CAF50;
color:white;
border:none;
border-radius:5px;
cursor:pointer;
}

.summary{
margin-top:15px;
padding:10px;
border:1px solid #ccc;
display:none;
}

</style>

</head>

<body>

<div class="container">

<h2>Đặt hàng</h2>

<form id="orderForm">

<div class="form-group">
<label>Sản phẩm</label>
<select id="product">
<option value="">-- Chọn sản phẩm --</option>
<option value="Ao">Áo</option>
<option value="Quan">Quần</option>
<option value="Giay">Giày</option>
</select>
<span class="error"></span>
</div>

<div class="form-group">
<label>Số lượng</label>
<input type="number" id="quantity">
<span class="error"></span>
</div>

<div class="form-group">
<label>Ngày giao</label>
<input type="date" id="delivery">
<span class="error"></span>
</div>

<div class="form-group">
<label>Địa chỉ giao</label>
<input type="text" id="address">
<span class="error"></span>
</div>

<div class="form-group">
<label>Ghi chú</label>
<textarea id="note" maxlength="200"></textarea>
<div class="counter" id="counter">0/200</div>
<span class="error"></span>
</div>

<div class="form-group">
<label>Thanh toán</label>

<div class="pay-group">
<label><input type="radio" name="pay" value="COD"> COD</label>
<label><input type="radio" name="pay" value="Bank"> Chuyển khoản</label>
<label><input type="radio" name="pay" value="Ewallet"> Ví điện tử</label>
</div>

<span class="error" id="payError"></span>
</div>

<div class="form-group">
<strong>Tổng tiền: </strong>
<span id="total">0</span> VND
</div>

<button type="submit">Đặt hàng</button>

</form>

<div class="summary" id="summary"></div>

</div>

<script>

const prices={
"Ao":150000,
"Quan":200000,
"Giay":300000
}

let form=document.getElementById("orderForm")

function showError(id,msg){
let el=document.getElementById(id)
el.nextElementSibling.innerText=msg
}

function clearError(id){
let el=document.getElementById(id)
el.nextElementSibling.innerText=""
}

function validateProduct(){
let p=document.getElementById("product").value
if(p===""){
showError("product","Chọn sản phẩm")
return false
}
clearError("product")
return true
}

function validateQuantity(){
let q=Number(document.getElementById("quantity").value)
if(!Number.isInteger(q)||q<1||q>99){
showError("quantity","1-99")
return false
}
clearError("quantity")
return true
}

function validateDate(){
let d=document.getElementById("delivery").value
if(d===""){
showError("delivery","Chọn ngày")
return false
}

let today=new Date()
let select=new Date(d)
let max=new Date()
max.setDate(today.getDate()+30)

if(select<today){
showError("delivery","Không chọn ngày quá khứ")
return false
}

if(select>max){
showError("delivery","Không quá 30 ngày")
return false
}

clearError("delivery")
return true
}

function validateAddress(){
let a=document.getElementById("address").value.trim()
if(a.length<10){
showError("address","Ít nhất 10 ký tự")
return false
}
clearError("address")
return true
}

function validateNote(){
let n=document.getElementById("note").value
if(n.length>200){
showError("note","Tối đa 200 ký tự")
return false
}
clearError("note")
return true
}

function validatePay(){
let radios=document.getElementsByName("pay")
for(let r of radios){
if(r.checked){
document.getElementById("payError").innerText=""
return true
}
}
document.getElementById("payError").innerText="Chọn phương thức"
return false
}

function calcTotal(){

let p=document.getElementById("product").value
let q=Number(document.getElementById("quantity").value)

if(prices[p] && q){
let total=prices[p]*q
document.getElementById("total").innerText=
total.toLocaleString("vi-VN")
}

}

document.getElementById("product").addEventListener("change",calcTotal)
document.getElementById("quantity").addEventListener("input",calcTotal)

document.getElementById("note").addEventListener("input",function(){

let len=this.value.length
document.getElementById("counter").innerText=len+"/200"

if(len>200){
document.getElementById("counter").style.color="red"
}else{
document.getElementById("counter").style.color="black"
}

})

form.addEventListener("submit",function(e){

e.preventDefault()

let valid=
validateProduct() &
validateQuantity() &
validateDate() &
validateAddress() &
validateNote() &
validatePay()

if(!valid) return

let p=document.getElementById("product").value
let q=document.getElementById("quantity").value
let d=document.getElementById("delivery").value
let total=document.getElementById("total").innerText

let summary=document.getElementById("summary")

summary.innerHTML=
"Sản phẩm: "+p+"<br>"+
"Số lượng: "+q+"<br>"+
"Tổng tiền: "+total+" VND<br>"+
"Ngày giao: "+d+"<br><br>"+
"<button id='confirm'>Xác nhận</button>"+
"<button id='cancel'>Hủy</button>"

summary.style.display="block"

document.getElementById("confirm").onclick=function(){
summary.innerHTML="Đặt hàng thành công 🎉"
}

document.getElementById("cancel").onclick=function(){
summary.style.display="none"
}

})

</script>

</body>
</html>
