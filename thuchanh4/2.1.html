<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Đăng ký tài khoản</title>

<style>

body{
font-family:Arial;
background:#f4f6fb;
display:flex;
justify-content:center;
padding:40px;
}

.container{
background:white;
padding:25px;
width:420px;
border-radius:10px;
box-shadow:0 4px 15px rgba(0,0,0,0.1);
}

h2{
text-align:center;
}

.form-group{
margin-bottom:12px;
}

input[type="text"],
input[type="password"]{
width:100%;
padding:7px;
border:1px solid #ccc;
border-radius:5px;
}

.error{
color:red;
font-size:13px;
}

.input-error{
border:2px solid red;
}

.input-success{
border:2px solid green;
}

.gender-group{
display:flex;
gap:20px;
margin-top:5px;
}

.checkbox-group{
margin-top:5px;
}

button{
margin-top:10px;
padding:8px;
width:100%;
background:#4CAF50;
color:white;
border:none;
border-radius:5px;
cursor:pointer;
}

#success{
text-align:center;
font-size:18px;
color:green;
}

</style>
</head>

<body>

<div class="container">

<form id="form">

<h2>Đăng ký tài khoản</h2>

<div class="form-group">
<label>Họ và tên</label>
<input type="text" id="fullname">
<span class="error"></span>
</div>

<div class="form-group">
<label>Email</label>
<input type="text" id="email">
<span class="error"></span>
</div>

<div class="form-group">
<label>Số điện thoại</label>
<input type="text" id="phone">
<span class="error"></span>
</div>

<div class="form-group">
<label>Mật khẩu</label>
<input type="password" id="password">
<span class="error"></span>
</div>

<div class="form-group">
<label>Xác nhận mật khẩu</label>
<input type="password" id="confirm">
<span class="error"></span>
</div>

<div class="form-group">
<label>Giới tính</label>

<div class="gender-group">
<label><input type="radio" name="gender" value="Nam"> Nam</label>
<label><input type="radio" name="gender" value="Nữ"> Nữ</label>
</div>

<span class="error" id="genderError"></span>
</div>

<div class="form-group checkbox-group">
<label>
<input type="checkbox" id="terms"> Tôi đồng ý điều khoản
</label>
<br>
<span class="error" id="termsError"></span>
</div>

<button type="submit">Đăng ký</button>

</form>

<div id="success"></div>

</div>

<script>

let form=document.getElementById("form")

function showError(id,msg){

let input=document.getElementById(id)
input.classList.add("input-error")
input.classList.remove("input-success")
input.nextElementSibling.innerText=msg

}

function clearError(id){

let input=document.getElementById(id)
input.classList.remove("input-error")
input.classList.add("input-success")
input.nextElementSibling.innerText=""

}

function validateFullname(){

let name=document.getElementById("fullname").value.trim()
let regex=/^[a-zA-ZÀ-ỹ\s]+$/

if(name===""){
showError("fullname","Không được để trống")
return false
}

if(name.length<3){
showError("fullname","Ít nhất 3 ký tự")
return false
}

if(!regex.test(name)){
showError("fullname","Chỉ chứa chữ")
return false
}

clearError("fullname")
return true

}

function validateEmail(){

let email=document.getElementById("email").value.trim()
let regex=/^[^\s@]+@[^\s@]+\.[^\s@]+$/

if(email===""){
showError("email","Không được để trống")
return false
}

if(!regex.test(email)){
showError("email","Email không hợp lệ")
return false
}

clearError("email")
return true

}

function validatePhone(){

let phone=document.getElementById("phone").value.trim()
let regex=/^0[0-9]{9}$/

if(phone===""){
showError("phone","Không được để trống")
return false
}

if(!regex.test(phone)){
showError("phone","SĐT không hợp lệ")
return false
}

clearError("phone")
return true

}

function validatePassword(){

let pass=document.getElementById("password").value
let regex=/^(?=.*[a-z])(?=.*[A-Z])(?=.*\d).{8,}$/

if(pass===""){
showError("password","Không được để trống")
return false
}

if(!regex.test(pass)){
showError("password","≥8 ký tự, có hoa, thường, số")
return false
}

clearError("password")
return true

}

function validateConfirm(){

let pass=document.getElementById("password").value
let confirm=document.getElementById("confirm").value

if(confirm!==pass){
showError("confirm","Mật khẩu không khớp")
return false
}

clearError("confirm")
return true

}

function validateGender(){

let genders=document.getElementsByName("gender")

for(let g of genders){
if(g.checked){
document.getElementById("genderError").innerText=""
return true
}
}

document.getElementById("genderError").innerText="Chọn giới tính"
return false

}

function validateTerms(){

if(!document.getElementById("terms").checked){
document.getElementById("termsError").innerText="Phải đồng ý điều khoản"
return false
}

document.getElementById("termsError").innerText=""
return true

}

form.addEventListener("submit",function(e){

e.preventDefault()

let valid=
validateFullname() &
validateEmail() &
validatePhone() &
validatePassword() &
validateConfirm() &
validateGender() &
validateTerms()

if(valid){

let name=document.getElementById("fullname").value

form.style.display="none"

document.getElementById("success").innerHTML=
"Đăng ký thành công 🎉<br>Xin chào "+name

}

})

document.getElementById("fullname").addEventListener("blur",validateFullname)
document.getElementById("email").addEventListener("blur",validateEmail)
document.getElementById("phone").addEventListener("blur",validatePhone)
document.getElementById("password").addEventListener("blur",validatePassword)
document.getElementById("confirm").addEventListener("blur",validateConfirm)

document.getElementById("fullname").addEventListener("input",()=>clearError("fullname"))
document.getElementById("email").addEventListener("input",()=>clearError("email"))
document.getElementById("phone").addEventListener("input",()=>clearError("phone"))
document.getElementById("password").addEventListener("input",()=>clearError("password"))
document.getElementById("confirm").addEventListener("input",()=>clearError("confirm"))

</script>

</body>
</html>
