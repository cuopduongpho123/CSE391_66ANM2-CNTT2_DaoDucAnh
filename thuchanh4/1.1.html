<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Quản lý điểm sinh viên</title>

<style>

body{
    font-family: Arial, sans-serif;
    background:#f4f6fb;
    display:flex;
    justify-content:center;
    padding:40px;
}

.container{
    background:white;
    padding:25px;
    width:700px;
    border-radius:10px;
    box-shadow:0 4px 15px rgba(0,0,0,0.1);
}

h2{
    text-align:center;
    margin-bottom:20px;
}

.input-group{
    display:flex;
    gap:10px;
    margin-bottom:15px;
}

input{
    flex:1;
    padding:8px;
    border-radius:6px;
    border:1px solid #ccc;
}

button{
    padding:8px 14px;
    border:none;
    border-radius:6px;
    cursor:pointer;
}

.add-btn{
    background:#4CAF50;
    color:white;
}

.delete-btn{
    background:#e74c3c;
    color:white;
}

table{
    width:100%;
    border-collapse:collapse;
}

th{
    background:#2c3e50;
    color:white;
}

th,td{
    padding:8px;
    text-align:center;
    border-bottom:1px solid #ddd;
}

tr:hover{
    background:#f1f1f1;
}

.weak{
    background:#fff3b0;
}

.stats{
    margin-top:10px;
    font-weight:bold;
}

</style>
</head>

<body>

<div class="container">

<h2>Bảng Điểm Sinh Viên</h2>

<div class="input-group">
<input type="text" id="name" placeholder="Họ tên">
<input type="number" id="score" placeholder="Điểm (0-10)">
<button class="add-btn" id="addBtn">Thêm</button>
</div>

<table>
<thead>
<tr>
<th>STT</th>
<th>Họ tên</th>
<th>Điểm</th>
<th>Xếp loại</th>
<th>Thao tác</th>
</tr>
</thead>

<tbody id="tableBody"></tbody>
</table>

<div class="stats" id="stat"></div>

</div>

<script>

let students=[];

function classify(score){
    if(score>=8.5) return "Giỏi";
    if(score>=7) return "Khá";
    if(score>=5) return "Trung bình";
    return "Yếu";
}

function renderTable(){

    let tbody=document.getElementById("tableBody");
    tbody.innerHTML="";

    let sum=0;

    students.forEach(function(st,index){

        sum+=st.score;

        let tr=document.createElement("tr");

        if(st.score<5){
            tr.classList.add("weak");
        }

        tr.innerHTML=
        "<td>"+(index+1)+"</td>"+
        "<td>"+st.name+"</td>"+
        "<td>"+st.score+"</td>"+
        "<td>"+classify(st.score)+"</td>"+
        "<td><button class='delete-btn' data-index='"+index+"'>Xóa</button></td>";

        tbody.appendChild(tr);

    });

    let avg=students.length? (sum/students.length).toFixed(2):0;

    document.getElementById("stat").innerText=
    "Tổng sinh viên: "+students.length+" | Điểm trung bình: "+avg;

}

function addStudent(){

    let name=document.getElementById("name").value.trim();
    let score=parseFloat(document.getElementById("score").value);

    if(name===""){
        alert("Họ tên không được trống");
        return;
    }

    if(isNaN(score)||score<0||score>10){
        alert("Điểm phải từ 0 đến 10");
        return;
    }

    students.push({name:name,score:score});

    renderTable();

    document.getElementById("name").value="";
    document.getElementById("score").value="";
    document.getElementById("name").focus();
}

document.getElementById("addBtn").onclick=addStudent;

document.getElementById("score").addEventListener("keypress",function(e){
    if(e.key==="Enter"){
        addStudent();
    }
});

document.getElementById("tableBody").addEventListener("click",function(e){

    if(e.target.tagName==="BUTTON"){

        let index=e.target.getAttribute("data-index");

        students.splice(index,1);

        renderTable();
    }

});

</script>

</body>
</html>
