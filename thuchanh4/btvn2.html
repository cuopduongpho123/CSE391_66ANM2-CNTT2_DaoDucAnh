<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Multi Step Form</title>

<style>

body{
font-family:Arial;
background:#f4f6fb;
display:flex;
justify-content:center;
padding:40px;
}

.container{
width:420px;
background:white;
padding:25px;
border-radius:10px;
box-shadow:0 4px 15px rgba(0,0,0,0.1);
}

.progress{
height:8px;
background:#ddd;
border-radius:5px;
margin-bottom:20px;
}

.progress-bar{
height:100%;
width:33%;
background:#4CAF50;
border-radius:5px;
transition:0.3s;
}

.step{
display:none;
}

.step.active{
display:block;
}

.form-group{
margin-bottom:12px;
}

input,select{
width:100%;
padding:7px;
border:1px solid #ccc;
border-radius:5px;
}

.gender-group{
display:flex;
gap:20px;
margin-top:5px;
}

.error{
color:red;
font-size:13px;
}

.buttons{
display:flex;
justify-content:space-between;
margin-top:10px;
}

button{
padding:8px 12px;
border:none;
background:#4CAF50;
color:white;
border-radius:5px;
cursor:pointer;
}

.summary{
line-height:1.6;
}

</style>
</head>

<body>

<div class="container">

<h2>Đăng ký</h2>

<div class="progress">
<div class="progress-bar" id="progressBar"></div>
</div>

<form id="form">

<!-- STEP 1 -->

<div class="step active" id="step1">

<div class="form-group">
<label>Họ tên</label>
<input type="text" id="fullname">
<span class="error"></span>
</div>

<div class="form-group">
<label>Ngày sinh</label>
<input type="date" id="birth">
<span class="error"></span>
</div>

<div class="form-group">
<label>Giới tính</label>

<div class="gender-group">
<label><input type="radio" name="gender" value="Nam"> Nam</label>
<label><input type="radio" name="gender" value="Nữ"> Nữ</label>
</div>

<span class="error" id="genderError"></span>

</div>

<div class="buttons">
<div></div>
<button type="button" id="next1">Tiếp theo</button>
</div>

</div>


<!-- STEP 2 -->

<div class="step" id="step2">

<div class="form-group">
<label>Email</label>
<input type="text" id="email">
<span class="error"></span>
</div>

<div class="form-group">
<label>Mật khẩu</label>
<input type="password" id="password">
<span class="error"></span>
</div>

<div class="form-group">
<label>Xác nhận mật khẩu</label>
<input type="password" id="confirm">
<span class="error"></span>
</div>

<div class="buttons">
<button type="button" id="back1">Quay lại</button>
<button type="button" id="next2">Tiếp theo</button>
</div>

</div>


<!-- STEP 3 -->

<div class="step" id="step3">

<h3>Xác nhận thông tin</h3>

<div class="summary" id="summary"></div>

<div class="buttons">
<button type="button" id="back2">Quay lại</button>
<button type="submit">Đăng ký</button>
</div>

</div>

</form>

</div>

<script>

let current=1
let progress=document.getElementById("progressBar")

function showStep(step){

document.querySelectorAll(".step").forEach(s=>s.classList.remove("active"))

document.getElementById("step"+step).classList.add("active")

progress.style.width=(step*33)+"%"

}

/* VALIDATE STEP 1 */

function validateStep1(){

let name=document.getElementById("fullname").value.trim()

if(name.length<3){
document.querySelector("#fullname + span").innerText="Ít nhất 3 ký tự"
return false
}

document.querySelector("#fullname + span").innerText=""

let birth=document.getElementById("birth").value

if(birth===""){
document.querySelector("#birth + span").innerText="Chọn ngày sinh"
return false
}

document.querySelector("#birth + span").innerText=""

let genders=document.getElementsByName("gender")

for(let g of genders){
if(g.checked){
document.getElementById("genderError").innerText=""
return true
}
}

document.getElementById("genderError").innerText="Chọn giới tính"

return false

}


/* VALIDATE STEP 2 */

function validateStep2(){

let email=document.getElementById("email").value
let pass=document.getElementById("password").value
let confirm=document.getElementById("confirm").value

let regex=/^[^\s@]+@[^\s@]+\.[^\s@]+$/

if(!regex.test(email)){
document.querySelector("#email + span").innerText="Email sai"
return false
}

document.querySelector("#email + span").innerText=""

if(pass.length<8){
document.querySelector("#password + span").innerText="≥8 ký tự"
return false
}

document.querySelector("#password + span").innerText=""

if(pass!==confirm){
document.querySelector("#confirm + span").innerText="Không khớp"
return false
}

document.querySelector("#confirm + span").innerText=""

return true

}


/* BUTTONS */

document.getElementById("next1").onclick=function(){

if(validateStep1()){
current=2
showStep(2)
}

}

document.getElementById("next2").onclick=function(){

if(validateStep2()){

let name=document.getElementById("fullname").value
let birth=document.getElementById("birth").value
let email=document.getElementById("email").value

let gender=""
document.getElementsByName("gender").forEach(g=>{
if(g.checked) gender=g.value
})

document.getElementById("summary").innerHTML=
"Họ tên: "+name+"<br>"+
"Ngày sinh: "+birth+"<br>"+
"Giới tính: "+gender+"<br>"+
"Email: "+email

current=3
showStep(3)

}

}

document.getElementById("back1").onclick=function(){
current=1
showStep(1)
}

document.getElementById("back2").onclick=function(){
current=2
showStep(2)
}

</script>

</body>
</html>
